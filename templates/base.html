<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>{% block title %}GST Invoice Generator{% endblock %}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet"></head><body>
<nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top"><div class="container-fluid px-4"><a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}"><i class="bi bi-receipt-cutoff me-2"></i>GST Invoice Generator</a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button><div id="nav" class="collapse navbar-collapse"><ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li><li class="nav-item"><a class="nav-link" href="{{ url_for('create_invoice') }}">Create Invoice</a></li><li class="nav-item"><a class="nav-link" href="{{ url_for('settings') }}">Company Settings</a></li></ul></div></div></nav>
<main class="container-fluid px-3 px-lg-4 py-4">{% with messages = get_flashed_messages(with_categories=true) %}{% for category, message in messages %}<div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm" role="alert">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>{% endfor %}{% endwith %}{% block content %}{% endblock %}</main><div id="loadingOverlay" class="loading-overlay d-none"><div class="spinner-border text-light"></div><span class="ms-3 text-white fw-semibold">Generating invoice...</span></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="{{ url_for('static', filename='js/invoice.js') }}"></script></body></html>

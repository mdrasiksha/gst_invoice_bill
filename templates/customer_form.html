{% extends "base.html" %}{% block title %}Customer{% endblock %}{% block content %}<div class="mx-auto" style="max-width:900px"><h1 class="h3 mb-3">{{ 'Edit' if customer.id else 'Add' }} Customer</h1><form class="card app-card" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><div class="card-body row g-3"><div class="col-md-6"><label class="form-label">Name *</label><input class="form-control" name="customer_name" required value="{{ customer.customer_name or '' }}"></div><div class="col-md-6"><label class="form-label">GSTIN</label><input class="form-control" name="gstin" value="{{ customer.gstin or '' }}"></div><div class="col-12"><label class="form-label">Address *</label><textarea class="form-control" name="address" required>{{ customer.address or '' }}</textarea></div><div class="col-md-4"><label class="form-label">City</label><input class="form-control" name="city" value="{{ customer.city or '' }}"></div><div class="col-md-4"><label class="form-label">State</label><select class="form-select" name="state" id="customerState"><option value="">Select state</option>{% for code, state in indian_states.items() %}<option value="{{ state }}" data-code="{{ code }}" {% if customer.state == state %}selected{% endif %}>{{ state }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Pincode</label><input class="form-control" name="pin_code" value="{{ customer.pin_code or '' }}"></div><div class="col-md-3"><label class="form-label">Phone</label><input class="form-control" name="phone" value="{{ customer.phone or '' }}"></div><div class="col-md-3"><label class="form-label">Email</label><input class="form-control" type="email" name="email" value="{{ customer.email or '' }}"></div><div class="col-md-3"><label class="form-label">State Code</label><input class="form-control" name="state_code" id="customerStateCode" value="{{ customer.state_code or '' }}" readonly aria-readonly="true"></div></div><div class="card-footer bg-white text-end"><button class="btn btn-primary">Save Customer</button></div></form></div><script>const st=document.getElementById("customerState"),sc=document.getElementById("customerStateCode");function syncCode(){if(st&&sc){sc.value=st.options[st.selectedIndex]?.dataset.code||"";}}st?.addEventListener("change",syncCode);syncCode();</script>{% endblock %}

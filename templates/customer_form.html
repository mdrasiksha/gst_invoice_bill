{% extends "base.html" %}{% block title %}Customer{% endblock %}{% block content %}<div class="mx-auto" style="max-width:900px"><h1 class="h3 mb-3">{{ 'Edit' if customer.id else 'Add' }} Customer</h1><form class="card app-card" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><div class="card-body row g-3"><div class="col-md-6"><label class="form-label">Name *</label><input class="form-control" name="customer_name" required value="{{ customer.customer_name or '' }}"></div><div class="col-md-6"><label class="form-label">GSTIN</label><input class="form-control" name="gstin" value="{{ customer.gstin or '' }}"></div><div class="col-12"><label class="form-label">Address *</label><textarea class="form-control" name="address" required>{{ customer.address or '' }}</textarea></div><div class="col-md-4"><label class="form-label">Phone</label><input class="form-control" name="phone" value="{{ customer.phone or '' }}"></div><div class="col-md-4"><label class="form-label">Email</label><input class="form-control" type="email" name="email" value="{{ customer.email or '' }}"></div><div class="col-md-4"><label class="form-label">State Code</label><input class="form-control" name="state_code" value="{{ customer.state_code or '' }}"></div></div><div class="card-footer bg-white text-end"><button class="btn btn-primary">Save Customer</button></div></form></div>{% endblock %}

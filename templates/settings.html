{% extends "base.html" %}{% block title %}Company Settings{% endblock %}{% block content %}<div class="mx-auto" style="max-width:1000px"><div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h3">Company Settings</h1><a class="btn btn-outline-secondary" href="{{ url_for('dashboard') }}">Back</a></div><form class="card app-card needs-validation" method="post" enctype="multipart/form-data" novalidate><div class="card-body row g-3"><input type="hidden" name="existing_logo" value="{{ company.logo_path }}"><div class="col-md-6"><label class="form-label">Company Name *</label><input class="form-control" name="company_name" required value="{{ company.seller_name }}"></div><div class="col-md-6"><label class="form-label">GSTIN *</label><input class="form-control text-uppercase" name="company_gstin" required pattern="[0-9]{2}[A-Za-z]{5}[0-9]{4}[A-Za-z][1-9A-Za-z]Z[0-9A-Za-z]" value="{{ company.gstin }}"></div><div class="col-12"><label class="form-label">Address *</label><textarea class="form-control" name="company_address" required rows="3">{{ company.address }}</textarea></div><div class="col-md-3"><label class="form-label">Phone</label><input class="form-control" name="company_phone" value="{{ company.phone }}"></div><div class="col-md-3"><label class="form-label">Email</label><input type="email" class="form-control" name="company_email" value="{{ company.email }}"></div><div class="col-md-3"><label class="form-label">Website</label><input class="form-control" name="website" value="{{ company.website }}"></div><div class="col-md-3"><label class="form-label">Company Logo</label><input type="file" class="form-control" name="company_logo" accept="image/png,image/jpeg"></div><div class="col-md-6"><label class="form-label">Bank Name</label><input class="form-control" name="bank_name" value="{{ company.bank_name }}"></div><div class="col-md-6"><label class="form-label">Account Number</label><input class="form-control" name="account_number" value="{{ company.account_number }}"></div><div class="col-md-6"><label class="form-label">IFSC Code</label><input class="form-control" name="ifsc_code" value="{{ company.ifsc_code }}"></div><div class="col-md-6"><label class="form-label">UPI ID</label><input class="form-control" name="upi_id" value="{{ company.upi_id }}"></div></div><div class="card-footer bg-white text-end"><button class="btn btn-primary px-4">Save Settings</button></div></form></div>{% endblock %}

{% extends "base.html" %}{% block title %}Complete Company Profile{% endblock %}{% block content %}<div class="mx-auto" style="max-width:1100px"><div class="d-flex justify-content-between mb-3"><div><p class="text-muted mb-1">Company Setup Wizard</p><h1 class="h3">Complete Company Profile</h1></div><a class="btn btn-outline-secondary align-self-start" href="{{ url_for('dashboard') }}">Back</a></div><form class="card app-card needs-validation" method="post" enctype="multipart/form-data" novalidate><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><div class="card-body row g-3"><div class="col-md-6"><label class="form-label">Company Name *</label><input class="form-control" name="company_name" required value="{{ company.company_name }}"></div><div class="col-md-6"><label class="form-label">GSTIN *</label><input class="form-control text-uppercase" name="gstin" required value="{{ company.gstin }}"></div><div class="col-12"><label class="form-label">Address *</label><textarea class="form-control" name="address" required rows="3">{{ company.address }}</textarea></div><div class="col-md-3"><label class="form-label">City *</label><input class="form-control" name="city" required value="{{ company.city }}"></div><div class="col-md-3"><label class="form-label">State *</label><input class="form-control" name="state" required value="{{ company.state }}"></div><div class="col-md-3"><label class="form-label">PIN Code *</label><input class="form-control" name="pin_code" required value="{{ company.pin_code }}"></div><div class="col-md-3"><label class="form-label">Logo</label><input class="form-control" type="file" name="logo" accept="image/png,image/jpeg"></div><div class="col-md-4"><label class="form-label">Phone</label><input class="form-control" name="phone" value="{{ company.phone }}"></div><div class="col-md-4"><label class="form-label">Email</label><input class="form-control" type="email" name="email" value="{{ company.email }}"></div><div class="col-md-4"><label class="form-label">Website</label><input class="form-control" name="website" value="{{ company.website }}"></div><div class="col-md-6"><label class="form-label">Bank Name</label><input class="form-control" name="bank_name" value="{{ company.bank_name }}"></div><div class="col-md-6"><label class="form-label">Account Number</label><input class="form-control" name="account_number" value="{{ company.account_number }}"></div><div class="col-md-6"><label class="form-label">IFSC Code</label><input class="form-control" name="ifsc" value="{{ company.ifsc }}"></div><div class="col-md-6"><label class="form-label">UPI ID</label><input class="form-control" name="upi_id" value="{{ company.upi_id }}"></div></div><div class="card-footer bg-white text-end"><button class="btn btn-primary px-4">Save Company Profile</button></div></form></div>{% endblock %}

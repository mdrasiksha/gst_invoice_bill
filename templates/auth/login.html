{% extends "base.html" %}{% block title %}Login{% endblock %}{% block content %}<div class="auth-card card app-card mx-auto"><div class="card-body p-4"><h1 class="h3">Smart GST Login</h1><p class="text-muted">Create professional GST invoices in under 30 seconds.</p><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><label class="form-label">Email</label><input class="form-control mb-3" type="email" name="email" required><label class="form-label">Password</label><input class="form-control mb-3" type="password" name="password" required><div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="remember" id="remember"><label class="form-check-label" for="remember">Remember me</label></div><button class="btn btn-primary w-100">Login</button></form><p class="small text-muted mt-3 mb-0">Need help? Contact <a href="mailto:gstsmartsupport@gmail.com">gstsmartsupport@gmail.com</a></p><div class="d-flex justify-content-between mt-3"><a href="{{ url_for('forgot_password') }}">Forgot password?</a><a href="{{ url_for('register') }}">Create account</a></div></div></div>{% endblock %}

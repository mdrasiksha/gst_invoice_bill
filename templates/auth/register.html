{% extends "base.html" %}{% block title %}Register{% endblock %}{% block content %}<div class="auth-card card app-card mx-auto"><div class="card-body p-4"><h1 class="h3">Start your company account</h1><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><label class="form-label">Company Name</label><input class="form-control mb-3" name="company_name" required><label class="form-label">Your Name</label><input class="form-control mb-3" name="username" required><label class="form-label">Email</label><input class="form-control mb-3" type="email" name="email" required><label class="form-label">Password</label><input class="form-control mb-3" type="password" name="password" minlength="8" required><button class="btn btn-primary w-100">Register</button></form><p class="mt-3 mb-0">Already registered? <a href="{{ url_for('login') }}">Login</a></p></div></div>{% endblock %}
